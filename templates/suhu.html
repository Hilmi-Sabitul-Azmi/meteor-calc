<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Calc - Konversi Suhu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes magmaMeteorAnimation {
            0% { transform: rotate(-40deg) translateX(0); opacity: 0; }
            15% { opacity: 1; }
            35% { transform: rotate(-40deg) translateX(-500px); opacity: 0; }
            100% { transform: rotate(-40deg) translateX(-500px); opacity: 0; }
        }
        .animate-meteor-magma-1 { animation: magmaMeteorAnimation 7s linear infinite; }
        @keyframes superNovaOrbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-orbit { animation: superNovaOrbit 1.5s linear infinite; }

        :root {
            --bg-gradient-start: #111111; --bg-gradient-end: #22252a;
            --card-bg: rgba(24, 24, 27, 0.9); --card-border: rgba(63, 63, 70, 0.6);
            --text-main: #ffffff; --text-muted: #a1a1aa;
        }
        body.light-theme {
            --bg-gradient-start: #f4f4f5; --bg-gradient-end: #e4e4e7;
            --card-bg: rgba(255, 255, 255, 0.95); --card-border: rgba(228, 228, 231, 1);
            --text-main: #18181b; --text-muted: #71717a;
        }
        .dynamic-bg { background-image: linear-gradient(to bottom, var(--bg-gradient-start), var(--bg-gradient-end)); }
        .dynamic-card { background-color: var(--card-bg); border-color: var(--card-border); }
        .dynamic-text { color: var(--text-main); }
        .dynamic-muted { color: var(--text-muted); }
    </style>
</head>
<body class="m-0 p-0 font-sans min-h-screen flex justify-center items-center overflow-x-hidden relative transition-colors duration-300">

    <div id="loading-screen" class="hidden fixed inset-0 w-full h-full bg-zinc-950/90 [@at-rule_body.light-theme_&]:bg-zinc-100/90 z-50 flex flex-col justify-center items-center">
        <div class="w-16 h-16 border-4 border-t-amber-500 border-r-orange-500 border-b-rose-600 border-l-zinc-300 rounded-full animate-orbit"></div>
        <p class="dynamic-text font-medium text-sm tracking-widest uppercase mt-5 animate-pulse">Menghitung Rumus Skala Termometer<span class="text-amber-500">...</span></p>
    </div>

    <div class="fixed top-0 left-0 w-full h-full dynamic-bg -z-20 transition-all duration-300">
        <div class="absolute top-[8%] left-[85%] w-[130px] h-[2px] bg-gradient-to-r from-amber-500 via-orange-400 to-transparent rotate-[-40deg] opacity-80 animate-meteor-magma-1"></div>
    </div>

    <div class="w-full max-w-[440px] p-6 box-border z-10">
        <div class="dynamic-card rounded-2xl p-8 shadow-2xl border backdrop-blur-sm transition-all duration-300">
            
            <div class="text-center mb-6">
                <h1 class="text-xl font-bold tracking-widest dynamic-text m-0">KONVERSI<span class="text-amber-500">.</span>SUHU</h1>
                <p class="text-xs tracking-wider dynamic-muted uppercase mt-1">Skala Metrik Termodinamika</p>
            </div>

            <form method="post" action="/suhu" onsubmit="tampilkanLoading()" class="space-y-4">
                <div>
                    <label class="text-xs dynamic-muted uppercase tracking-wider block mb-1">Besar Nilai Suhu</label>
                    <input type="number" name="nilai" step="any" required value="{{ nilai if nilai is not none }}" class="w-full bg-zinc-800 [.light-theme_&]:bg-white border border-zinc-700 [.light-theme_&]:border-zinc-300 rounded-lg p-2.5 text-sm text-white [.light-theme_&]:text-zinc-900 focus:outline-none focus:border-amber-500">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs dynamic-muted uppercase tracking-wider block mb-1">Dari</label>
                        <select name="dari" class="w-full bg-zinc-800 [.light-theme_&]:bg-white border border-zinc-700 [.light-theme_&]:border-zinc-300 rounded-lg p-2.5 text-sm text-white [.light-theme_&]:text-zinc-900 focus:outline-none focus:border-amber-500">
                            <option value="celsius" {% if dari == 'celsius' %}selected{% endif %}>Celsius (°C)</option>
                            <option value="fahrenheit" {% if dari == 'fahrenheit' %}selected{% endif %}>Fahrenheit (°F)</option>
                            <option value="kelvin" {% if dari == 'kelvin' %}selected{% endif %}>Kelvin (K)</option>
                            <option value="reamur" {% if dari == 'reamur' %}selected{% endif %}>Reamur (°R)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs dynamic-muted uppercase tracking-wider block mb-1">Ke</label>
                        <select name="ke" class="w-full bg-zinc-800 [.light-theme_&]:bg-white border border-zinc-700 [.light-theme_&]:border-zinc-300 rounded-lg p-2.5 text-sm text-white [.light-theme_&]:text-zinc-900 focus:outline-none focus:border-amber-500">
                            <option value="celsius" {% if ke == 'celsius' %}selected{% endif %}>Celsius (°C)</option>
                            <option value="fahrenheit" {% if ke == 'fahrenheit' %}selected{% endif %}>Fahrenheit (°F)</option>
                            <option value="kelvin" {% if ke == 'kelvin' %}selected{% endif %}>Kelvin (K)</option>
                            <option value="reamur" {% if ke == 'reamur' %}selected{% endif %}>Reamur (°R)</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-zinc-950 font-bold py-2.5 px-4 rounded-xl text-sm transition-all duration-200 shadow-lg">
                    🌡️ Hitung Transisi Suhu
                </button>
            </form>

            {% if hasil is not none %}
                <div class="mt-5 pt-4 border-t border-zinc-500/20 text-left">
                    <h3 class="text-xs font-bold dynamic-muted uppercase tracking-wider mb-2">Hasil Akhir:</h3>
                    <div class="bg-zinc-800/60 [.light-theme_&]:bg-zinc-100 border border-zinc-700/60 [.light-theme_&]:border-zinc-200 p-3 rounded-xl text-sm dynamic-text font-mono text-center">
                        {{ nilai }} {{ dari | capitalize }} = <span class="text-amber-500 font-bold">{{ hasil }} {{ ke | capitalize }}</span>
                    </div>
                    
                    <h3 class="text-xs font-bold dynamic-muted uppercase tracking-wider mt-4 mb-2">Rumus & Langkah Substitusi:</h3>
                    <div class="bg-zinc-950 [.light-theme_&]:bg-zinc-50 p-4 border-l-2 border-amber-500 rounded-lg text-xs font-mono dynamic-text border-y border-r border-zinc-700/20">
                        {% for baris in langkah %}
                            <p class="whitespace-pre-wrap">{{ baris }}</p>
                        {% endfor %}
                    </div>
                </div>
            {% endif %}

            <div class="mt-5 pt-3 border-t border-zinc-500/20">
                <button onclick="navigasiKe('/konversi')" class="bg-zinc-800 [.light-theme_&]:bg-zinc-200 border border-zinc-700 [.light-theme_&]:border-zinc-300 text-zinc-300 [.light-theme_&]:text-zinc-700 py-2 px-4 w-full text-xs font-semibold rounded-lg transition-all duration-300 hover:opacity-90">
                    ↩ Kembali ke Menu Konversi
                </button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'light') { document.body.classList.add('light-theme'); }
        function tampilkanLoading() { document.getElementById('loading-screen').classList.remove('hidden'); }
        function navigasiKe(urlTujuan) {
            tampilkanLoading();
            setTimeout(function() { window.location.href = urlTujuan; }, 500);
        }
    </script>
</body>
</html>
