<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteor Calc - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. Animasi Lintasan Meteor */
        @keyframes magmaMeteorAnimation {
            0% { transform: rotate(-40deg) translateX(0); opacity: 0; }
            15% { opacity: 1; }
            35% { transform: rotate(-40deg) translateX(-500px); opacity: 0; }
            100% { transform: rotate(-40deg) translateX(-500px); opacity: 0; }
        }
        .animate-meteor-magma-1 { animation: magmaMeteorAnimation 7s linear infinite; }
        .animate-meteor-magma-2 { animation: magmaMeteorAnimation 10s linear infinite; animation-delay: 3.5s; }

        @keyframes superNovaOrbit { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-orbit { animation: superNovaOrbit 1.5s linear infinite; }

        /* 2. BRIDGE STRATEGY: Memetakan class .light-theme JavaScript ke Utility Tailwind */
        /* Kita manipulasi warna menggunakan custom CSS variables yang berubah saat .light-theme aktif */
        :root {
            --bg-gradient-start: #111111; --bg-gradient-end: #22252a;
            --card-bg: rgba(24, 24, 27, 0.9); --card-border: rgba(63, 63, 70, 0.6);
            --text-main: #ffffff; --text-muted: #a1a1aa;
            --btn-bg: rgba(39, 39, 42, 0.5); --btn-border: rgba(63, 63, 70, 0.7);
        }

        body.light-theme {
            --bg-gradient-start: #f4f4f5; --bg-gradient-end: #e4e4e7;
            --card-bg: rgba(255, 255, 255, 0.95); --card-border: rgba(228, 228, 231, 1);
            --text-main: #18181b; --text-muted: #71717a;
            --btn-bg: rgba(244, 244, 245, 1); --btn-border: rgba(212, 212, 216, 0.8);
        }

        /* Terapkan variabel custom ke dalam class penumpang */
        .dynamic-bg { background: bg-gradient-to-b; background-image: linear-gradient(to bottom, var(--bg-gradient-start), var(--bg-gradient-end)); }
        .dynamic-card { background-color: var(--card-bg); border-color: var(--card-border); }
        .dynamic-text { color: var(--text-main); }
        .dynamic-muted { color: var(--text-muted); }
        .dynamic-btn { background-color: var(--btn-bg); border-color: var(--btn-border); }
    </style>
</head>
<body class="m-0 p-0 font-sans min-h-screen flex justify-center items-center overflow-x-hidden relative transition-colors duration-300">

    <div id="loading-screen" class="hidden fixed inset-0 w-full h-full bg-zinc-950/90 [@at-rule_body.light-theme_&]:bg-zinc-100/90 z-50 flex flex-col justify-center items-center">
        <div class="w-16 h-16 border-4 border-t-amber-500 border-r-orange-500 border-b-rose-600 border-l-zinc-300 rounded-full animate-orbit shadow-[0_0_20px_rgba(245,158,11,0.4)]"></div>
        <p class="dynamic-text font-medium text-sm tracking-widest uppercase mt-5 animate-pulse">
            Menghubungkan Modul Perhitungan<span class="text-amber-500">...</span>
        </p>
    </div>

    <div class="fixed top-0 left-0 w-full h-full dynamic-bg -z-20 transition-all duration-300">
        <div class="absolute top-[8%] left-[85%] w-[130px] h-[2px] bg-gradient-to-r from-amber-500 via-orange-400 to-transparent rotate-[-40deg] opacity-80 animate-meteor-magma-1"></div>
        <div class="absolute top-[22%] left-[90%] w-[90px] h-[1.5px] bg-gradient-to-r from-rose-500 via-orange-400 to-transparent rotate-[-40deg] opacity-60 animate-meteor-magma-2"></div>
    </div>

    <div class="w-full max-w-[440px] p-6 box-border z-10">
        
        <div class="flex justify-end mb-2">
            <button onclick="toggleTheme()" class="dynamic-btn border p-2 rounded-xl text-xs font-semibold dynamic-text shadow-sm transition-all hover:scale-105">
                🌓 Ganti Mode
            </button>
        </div>

        <div class="dynamic-card rounded-2xl p-8 shadow-2xl border backdrop-blur-sm text-center transition-all duration-300">
            
            <div class="mb-6">
                <div class="w-12 h-12 mx-auto mb-3 bg-gradient-to-br from-amber-500 to-rose-600 rounded-full shadow-[0_0_15px_rgba(245,158,11,0.5)] relative">
                    <div class="absolute inset-1 bg-zinc-900 [.light-theme_&]:bg-white rounded-full flex items-center justify-center transition-colors">
                        <span class="text-amber-500 text-lg">☄</span>
                    </div>
                </div>
                <h1 class="text-2xl font-bold tracking-widest dynamic-text m-0 transition-colors">METEOR<span class="text-amber-500">.</span>CALC</h1>
                <p class="text-xs tracking-wider dynamic-muted uppercase mt-1 transition-colors">Sistem Pengolahan Perhitungan</p>
            </div>

            <div class="h-[1px] bg-gradient-to-r from-transparent via-zinc-500/30 to-transparent my-6"></div>

            <p class="text-xs font-medium dynamic-muted uppercase tracking-wider mb-4 transition-colors">Pilih Modul Perhitungan</p>
            
            <div class="flex flex-col gap-3">
                <button onclick="navigasiKe('/aritmatika')" class="group dynamic-btn border p-3.5 rounded-xl flex items-center transition-all duration-300 text-left hover:border-amber-500 hover:translate-x-1">
                    <span class="w-8 h-8 bg-amber-950/25 [.light-theme_&]:bg-amber-100 text-amber-500 rounded-lg flex justify-center items-center font-bold text-sm mr-4 border border-amber-500/20 group-hover:bg-amber-500 group-hover:text-zinc-950 transition-colors duration-300">＋</span>
                    <span class="text-sm font-semibold dynamic-text transition-colors">Operasi Aritmatika</span>
                </button>
                
                <button onclick="navigasiKe('/logika')" class="group dynamic-btn border p-3.5 rounded-xl flex items-center transition-all duration-300 text-left hover:border-amber-500 hover:translate-x-1">
                    <span class="w-8 h-8 bg-amber-950/25 [.light-theme_&]:bg-amber-100 text-amber-500 rounded-lg flex justify-center items-center font-bold text-sm mr-4 border border-amber-500/20 group-hover:bg-amber-500 group-hover:text-zinc-950 transition-colors duration-300">⇄</span>
                    <span class="text-sm font-semibold dynamic-text transition-colors">Gerbang Logika</span>
                </button>
                
                <button onclick="navigasiKe('/konversi')" class="group dynamic-btn border p-3.5 rounded-xl flex items-center transition-all duration-300 text-left hover:border-amber-500 hover:translate-x-1">
                    <span class="w-8 h-8 bg-amber-950/25 [.light-theme_&]:bg-amber-100 text-amber-500 rounded-lg flex justify-center items-center font-bold text-sm mr-4 border border-amber-500/20 group-hover:bg-amber-500 group-hover:text-zinc-950 transition-colors duration-300">⇅</span>
                    <span class="text-sm font-semibold dynamic-text transition-colors">Menu Konversi</span>
                </button>
                
                <button onclick="navigasiKe('/deret')" class="group dynamic-btn border p-3.5 rounded-xl flex items-center transition-all duration-300 text-left hover:border-amber-500 hover:translate-x-1">
                    <span class="w-8 h-8 bg-amber-950/25 [.light-theme_&]:bg-amber-100 text-amber-500 rounded-lg flex justify-center items-center font-bold text-sm mr-4 border border-amber-500/20 group-hover:bg-amber-500 group-hover:text-zinc-950 transition-colors duration-300">∼</span>
                    <span class="text-sm font-semibold dynamic-text transition-colors">Faktorial & Fibonacci</span>
                </button>
            </div>

            <div class="mt-6">
                <button onclick="navigasiKe('/history')" class="bg-transparent border border-dashed border-zinc-500 text-zinc-400 [.light-theme_&]:text-zinc-600 py-2.5 px-4 w-full text-xs font-semibold rounded-lg transition-all duration-300 hover:border-amber-500 hover:text-amber-500">
                    📋 Lihat Riwayat Perhitungan
                </button>
                <p class="text-[11px] dynamic-muted mt-5 m-0 tracking-wider transition-colors">Aplikasi oleh: <span class="dynamic-text font-medium">Hilmi Sabitul Azmi</span></p>
            </div>
        </div>
    </div>

    <script>
        // Cek preferensi tema saat halaman dimuat agar sinkron
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }

        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('light-theme');
            
            // Simpan status tema ke local storage agar tidak reset saat pindah halaman
            if (body.classList.contains('light-theme')) {
                localStorage.setItem('theme', 'light');
            } else {
                localStorage.setItem('theme', 'dark');
            }
        }

        function navigasiKe(urlTujuan) {
            document.getElementById('loading-screen').classList.remove('hidden');
            setTimeout(function() { window.location.href = urlTujuan; }, 600);
        }
    </script>
</body>
</html>
